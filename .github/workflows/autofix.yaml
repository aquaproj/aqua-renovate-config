---
name: autofix.ci
on: pull_request
permissions: {}
jobs:
  autofix:
    runs-on: ubuntu-24.04
    permissions: {}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1
      - run: aqua upc -prune
      - run: git ls-files | nllint -s -f
      - run: |
          git ls-files | grep -E "\.jsonnet$" | xargs -n 1 jsonnetfmt -i
          git ls-files | grep -E "\.libsonnet$" | xargs -n 1 jsonnetfmt -i
      - run: bash scripts/generate.sh
      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
